<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2a1220">
  <title>爱心弹窗烟花</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage" id="stage">
    <section class="hud is-collapsed" id="hud">
      <button class="hud-toggle" id="hud-toggle" type="button" aria-expanded="false" aria-label="展开说明面板">
        展开
      </button>
      <div class="hud-copy">
        <p class="eyebrow">Warm Popups</p>
        <h1 class="title">爱心会先长出来，再把温柔炸满整屏</h1>
        <p class="subtitle">
          这是一份可以直接打开运行的小动画。每个小弹窗都是一句暖心话，先拼成爱心，再像烟花一样散到整个屏幕。
        </p>
        <div class="toolbar">
          <span class="status-pill" id="status">正在酝酿心意...</span>
          <button class="replay" id="replay" type="button">再炸一次</button>
        </div>
      </div>
    </section>

    <div class="legend" id="counter">准备中</div>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
